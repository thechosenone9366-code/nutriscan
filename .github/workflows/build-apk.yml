name: Build NutriScan APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Apply Android resources
        run: |
          cp android-resources/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          cp android-resources/strings.xml android/app/src/main/res/values/strings.xml
          cp android-resources/styles.xml android/app/src/main/res/values/styles.xml

      - name: Generate app icons
        run: |
          pip install Pillow -q
          python3 << 'PYEOF'
          from PIL import Image
          import os
          src = "www/icon-512.png"
          sizes = {"mdpi": 48, "hdpi": 72, "xhdpi": 96, "xxhdpi": 144, "xxxhdpi": 192}
          for density, size in sizes.items():
              for name in ["ic_launcher", "ic_launcher_round"]:
                  path = f"android/app/src/main/res/mipmap-{density}/{name}.png"
                  os.makedirs(os.path.dirname(path), exist_ok=True)
                  img = Image.open(src).resize((size, size), Image.LANCZOS)
                  img.save(path)
          PYEOF

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NutriScan-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
